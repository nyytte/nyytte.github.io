<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Tilted rounded rectangle outline -->
  <rect x="20" y="20" width="88" height="88" rx="16" ry="16" stroke="url(#lg)" stroke-width="5" fill="none" transform="rotate(-8 64 64)"/>
  <!-- Small square cutout in top-right -->
  <rect x="74" y="28" width="16" height="16" rx="3" ry="3" stroke="url(#lg)" stroke-width="4" fill="url(#lg)" transform="rotate(-8 82 36)" opacity="0.8"/>
  <!-- "Lu" text styled as code -->
  <text x="34" y="94" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="34" fill="url(#lg)" transform="rotate(-8 64 64)">Luau</text>
</svg>
