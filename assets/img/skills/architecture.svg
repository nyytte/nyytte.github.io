<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Top block -->
  <rect x="42" y="16" width="44" height="28" rx="6" stroke="url(#ag)" stroke-width="5" fill="none"/>
  <!-- Bottom-left block -->
  <rect x="14" y="68" width="40" height="28" rx="6" stroke="url(#ag)" stroke-width="5" fill="none"/>
  <!-- Bottom-right block -->
  <rect x="74" y="68" width="40" height="28" rx="6" stroke="url(#ag)" stroke-width="5" fill="none"/>
  <!-- Connecting lines -->
  <line x1="64" y1="44" x2="64" y2="56" stroke="url(#ag)" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="56" x2="34" y2="68" stroke="url(#ag)" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="56" x2="94" y2="68" stroke="url(#ag)" stroke-width="4" stroke-linecap="round"/>
  <!-- Small dots at connection points -->
  <circle cx="64" cy="56" r="4" fill="url(#ag)"/>
</svg>
