<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Orbital rings -->
  <ellipse cx="64" cy="64" rx="52" ry="20" stroke="url(#rg)" stroke-width="4" transform="rotate(0 64 64)"/>
  <ellipse cx="64" cy="64" rx="52" ry="20" stroke="url(#rg)" stroke-width="4" transform="rotate(60 64 64)"/>
  <ellipse cx="64" cy="64" rx="52" ry="20" stroke="url(#rg)" stroke-width="4" transform="rotate(120 64 64)"/>
  <!-- Center nucleus -->
  <circle cx="64" cy="64" r="8" fill="url(#rg)"/>
</svg>
