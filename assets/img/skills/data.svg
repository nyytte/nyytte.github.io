<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="dg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Database cylinder top -->
  <ellipse cx="64" cy="30" rx="40" ry="14" stroke="url(#dg)" stroke-width="5" fill="none"/>
  <!-- Database body -->
  <line x1="24" y1="30" x2="24" y2="98" stroke="url(#dg)" stroke-width="5"/>
  <line x1="104" y1="30" x2="104" y2="98" stroke="url(#dg)" stroke-width="5"/>
  <!-- Middle ellipse (shelf) -->
  <ellipse cx="64" cy="64" rx="40" ry="14" stroke="url(#dg)" stroke-width="4" fill="none" opacity="0.5"/>
  <!-- Database bottom -->
  <ellipse cx="64" cy="98" rx="40" ry="14" stroke="url(#dg)" stroke-width="5" fill="none"/>
  <!-- Data dots -->
  <circle cx="50" cy="50" r="3" fill="url(#dg)" opacity="0.7"/>
  <circle cx="64" cy="48" r="3" fill="url(#dg)" opacity="0.7"/>
  <circle cx="78" cy="50" r="3" fill="url(#dg)" opacity="0.7"/>
</svg>
